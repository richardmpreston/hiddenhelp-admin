<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Help</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Sora+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
/* ── Variables ─────────────────────────────────────────────── */
:root {
  --bg:        #F7F4F0;
  --bg2:       #EFEBE4;
  --bg3:       #E6E0D6;
  --panel:     #FFFFFF;
  --border:    #DDD8CF;
  --text:      #1C1916;
  --text2:     #5C564E;
  --text3:     #9C9389;
  --accent:    #C0532A;
  --accent-bg: #F9EDE7;
  --green:     #3A7D44;
  --green-bg:  #E8F4EA;
  --blue:      #1A5FA8;
  --blue-bg:   #E5EFFE;
  --amber:     #8A6000;
  --amber-bg:  #FEF3D8;
  --red:       #9B2020;
  --red-bg:    #FDEAEA;
  --purple:    #5B3D8A;
  --purple-bg: #F0EAFE;
  --radius:    8px;
  --radius-sm: 5px;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --font:      'Sora', sans-serif;
  --sidebar-w: 280px;
}

/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); font-size: 14px; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: var(--font); }
a { color: inherit; text-decoration: none; }

/* ── Login ─────────────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.login-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px 40px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow);
  text-align: center;
}
.login-logo {
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -.3px;
  margin-bottom: 6px;
}
.login-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 36px;
}
.login-label {
  display: block;
  text-align: left;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
}
.login-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%;
  margin-top: 16px;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  transition: opacity .15s;
}
.login-btn:hover { opacity: .88; }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }
.login-msg {
  margin-top: 16px;
  font-size: 13px;
  color: var(--text2);
  min-height: 20px;
}
.login-msg.ok  { color: var(--green); }
.login-msg.err { color: var(--red); }

/* ── App shell ─────────────────────────────────────────────── */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

.app-header {
  height: 48px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.app-logo {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -.2px;
  margin-right: auto;
}
.user-email {
  font-size: 12px;
  color: var(--text3);
}
.sign-out-btn {
  font-size: 12px;
  color: var(--text2);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  transition: background .15s;
}
.sign-out-btn:hover { background: var(--bg2); }

.app-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
}
.search-input:focus { border-color: var(--accent); }
.filter-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.pill {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--text2);
  background: var(--bg);
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.pill.active {
  background: var(--accent-bg);
  border-color: #E8A485;
  color: var(--accent);
  font-weight: 500;
}
.ref-list {
  flex: 1;
  overflow-y: auto;
}
.ref-list-empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}

/* ── Referral list item ────────────────────────────────────── */
.ref-item {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}
.ref-item:hover { background: var(--bg); }
.ref-item.selected {
  background: var(--accent-bg);
  border-left: 3px solid var(--accent);
  padding-left: 11px;
}
.ref-item-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
}
.ref-num { font-size: 13px; font-weight: 600; color: var(--text); }
.ref-date { font-size: 11px; color: var(--text3); }
.ref-name { font-size: 13px; color: var(--text); margin-bottom: 1px; }
.ref-org  { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
.tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 99px;
}
.tag-delivery   { background: var(--blue-bg);   color: var(--blue); }
.tag-collection { background: var(--green-bg);  color: var(--green); }
.tag-new        { background: var(--bg2);        color: var(--text2); }
.tag-wishlist   { background: var(--amber-bg);  color: var(--amber); }
.tag-gathered   { background: var(--purple-bg); color: var(--purple); }
.tag-completed  { background: var(--green-bg);  color: var(--green); }
.tag-cancelled  { background: var(--red-bg);    color: var(--red); }
.tag-crisis     { background: var(--bg2);        color: var(--text2); }
.tag-vuln       { background: var(--red-bg);    color: var(--red); }

/* ── Detail panel ──────────────────────────────────────────── */
.detail {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.detail-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 13px;
}
.detail-header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
}
.detail-header-left h2 {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.2px;
  margin-bottom: 3px;
}
.detail-header-left p { font-size: 12px; color: var(--text2); }
.detail-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  transition: background .12s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg2); }
.btn-maps { background: var(--blue-bg); border-color: #B5CEFF; color: var(--blue); }
.btn-maps:hover { background: #D8E8FF; }
.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Stat row ──────────────────────────────────────────────── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.stat {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
}
.stat label {
  font-size: 11px;
  color: var(--text3);
  display: block;
  margin-bottom: 3px;
  font-weight: 500;
}
.stat span { font-size: 14px; font-weight: 500; }
.stat-completed { color: var(--green); }
.stat-gathered  { color: var(--purple); }
.stat-cancelled { color: var(--red); }
.stat-wishlist  { color: var(--amber); }
.stat-new       { color: var(--text2); }

/* ── Cards ─────────────────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.card-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
}
.card-title-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}
.card-title-row .card-title { margin-bottom: 0; flex: 1; }
.field { margin-bottom: 8px; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 2px; font-weight: 500; }
.field span, .field a { font-size: 13px; color: var(--text); }
.field a { color: var(--blue); }
.field a:hover { text-decoration: underline; }
.address-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 10px;
}
.address-note { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ── Milestones ────────────────────────────────────────────── */
.ms-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.ms-row:last-child { border-bottom: none; }
.ms-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ms-dot-done    { background: var(--green); }
.ms-dot-next    { background: var(--amber); }
.ms-dot-pending { background: var(--bg3); }
.ms-label { font-size: 12px; color: var(--text2); flex: 1; }
.ms-date  { font-size: 11px; color: var(--text3); }

/* ── Wishlist items ────────────────────────────────────────── */
.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.item-row:last-child { border-bottom: none; }
.item-qty  { font-size: 12px; font-weight: 600; color: var(--text3); min-width: 24px; }
.item-name { font-size: 13px; flex: 1; }
.item-cat  { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; }
.ic-general    { background: var(--bg2); color: var(--text2); }
.ic-furniture  { background: var(--purple-bg); color: var(--purple); }
.ic-electrical { background: var(--amber-bg); color: var(--amber); }

/* ── Payment ───────────────────────────────────────────────── */
.pay-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.pay-row:last-child { border-bottom: none; }
.pay-label { font-size: 12px; color: var(--text2); }
.pay-value { font-size: 12px; font-weight: 500; }

/* ── Notes ─────────────────────────────────────────────────── */
.notes-area {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  resize: vertical;
  min-height: 72px;
  outline: none;
  transition: border-color .15s;
}
.notes-area:focus { border-color: var(--accent); }
.notes-save {
  margin-top: 8px;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 16px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  transition: opacity .15s;
}
.notes-save:hover { opacity: .85; }

/* ── Edit controls ─────────────────────────────────────────── */
.btn-edit-card {
  font-size: 11px;
  color: var(--text3);
  padding: 2px 9px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  transition: all .12s;
  white-space: nowrap;
}
.btn-edit-card:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
.btn-edit-card.active { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }

.ms-edit-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.ms-edit-row:last-of-type { border-bottom: none; }
.ms-edit-label {
  font-size: 12px;
  color: var(--text2);
  width: 130px;
  flex-shrink: 0;
}
.ms-dt-input {
  flex: 1;
  font-size: 12px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  outline: none;
  font-family: var(--font);
}
.ms-dt-input:focus { border-color: var(--accent); }
.btn-now {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 9px;
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  white-space: nowrap;
  transition: all .12s;
}
.btn-now:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

.vol-edit-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.vol-select {
  flex: 1;
  font-size: 12px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  outline: none;
}
.vol-select:focus { border-color: var(--accent); }

.edit-actions {
  display: flex;
  gap: 8px;
  padding-top: 10px;
  margin-top: 2px;
  border-top: 1px solid var(--border);
}
.btn-save-edit {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 16px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  border: none;
  transition: opacity .12s;
}
.btn-save-edit:hover { opacity: .85; }
.btn-cancel-edit {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  background: var(--bg);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: background .12s;
}
.btn-cancel-edit:hover { background: var(--bg2); }

.pay-date-input {
  font-size: 12px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  outline: none;
  font-family: var(--font);
}
.pay-date-input:focus { border-color: var(--accent); }

/* ── Actions card ──────────────────────────────────────────── */
.action-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.action-card-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
}
.action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-do-cancel {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid #F3BEBE;
  border-radius: var(--radius-sm);
  background: var(--red-bg);
  color: var(--red);
  transition: opacity .12s;
}
.btn-do-cancel:hover { opacity: .8; }
.btn-do-uncomplete {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text2);
  transition: background .12s;
}
.btn-do-uncomplete:hover { background: var(--bg2); }
.cancel-reason-area {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  resize: none;
  height: 60px;
  outline: none;
  margin-top: 8px;
  display: block;
}
.cancel-reason-area:focus { border-color: var(--red); }
.btn-do-convert {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid #B5CEFF;
  border-radius: var(--radius-sm);
  background: var(--blue-bg);
  color: var(--blue);
  transition: opacity .12s;
}
.btn-do-convert:hover { opacity: .8; }

.btn-confirm-cancel {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 16px;
  background: var(--red);
  color: #fff;
  border-radius: var(--radius-sm);
  border: none;
  transition: opacity .12s;
}
.btn-confirm-cancel:hover { opacity: .85; }

/* ── Banner ────────────────────────────────────────────────── */
.cancelled-banner {
  background: var(--red-bg);
  border: 1px solid #F3BEBE;
  border-radius: var(--radius-sm);
  padding: 9px 14px;
  font-size: 12px;
  color: var(--red);
  font-weight: 500;
}

/* ── Loading ───────────────────────────────────────────────── */
.loading {
  padding: 32px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}

/* ── Mobile ────────────────────────────────────────────────── */
@media (max-width: 700px) {
  :root { --sidebar-w: 100vw; }
  .app-body { flex-direction: column; }
  .sidebar {
    width: 100%;
    min-width: 100%;
    max-height: 50vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .detail { min-height: 50vh; }
  .two-col { grid-template-columns: 1fr; }
  .stat-row { grid-template-columns: 1fr 1fr; }
  .detail-header { flex-direction: column; gap: 10px; }
  .detail-actions { width: 100%; justify-content: flex-end; }
  .ms-edit-label { width: 100px; }
}
</style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Hidden Help</div>
    <div class="login-sub">Referral management</div>
    <label class="login-label">Email address</label>
    <input id="login-email" class="login-input" type="email" placeholder="your@email.com" />
    <button id="login-btn" class="login-btn">Send magic link</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<!-- ── App ────────────────────────────────────────────────── -->
<div id="app">
  <header class="app-header">
    <div class="app-logo">Hidden Help</div>
    <span id="user-email" class="user-email"></span>
    <button id="sign-out-btn" class="sign-out-btn">Sign out</button>
  </header>
  <div class="app-body">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-top">
        <div style="display:flex;gap:6px;align-items:center;">
          <input id="search" class="search-input" type="search" placeholder="Search name, ref, org…" style="flex:1;" />
          <button id="sort-btn" title="Sort order" style="flex-shrink:0;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:14px;line-height:1;cursor:pointer;transition:background .12s;" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background='var(--bg)'">↓</button>
        </div>
        <div class="filter-row">
          <button class="pill active" data-filter="all">All</button>
          <button class="pill" data-filter="active">Active</button>
          <button class="pill" data-filter="delivery">Delivery</button>
          <button class="pill" data-filter="collection">Collection</button>
          <button class="pill" data-filter="awaiting-wishlist">Awaiting wishlist</button>
          <button class="pill" data-filter="completed">Completed</button>
          <button class="pill" data-filter="cancelled">Cancelled</button>
        </div>
      </div>
      <div id="ref-list" class="ref-list">
        <div class="loading">Loading referrals…</div>
      </div>
    </div>

    <!-- Detail -->
    <div id="detail" class="detail">
      <div class="detail-empty">Select a referral to view details</div>
    </div>

  </div>
</div>

<script>
// ── Init ────────────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { flowType: 'implicit' }
});

let allReferrals   = [];
let selectedRef    = null;
let activeFilter   = 'all';
let searchQuery    = '';
let sortAscending  = false;
const WISHLIST_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSej2Tb1f1qxZcaiQ-Zrv77afU4nwIDL8PPO-LM-jguJPakLsQ/viewform?entry.175428476=';

let editingSection  = null;  // 'milestones' | 'payment' | null
let showCancelForm  = false;
let showConvertForm = false;
let volunteers     = [];

// ── Auth ────────────────────────────────────────────────────
async function initAuth() {
  const { data: { session } } = await db.auth.getSession();
  if (session) showApp(session.user);
  else         showLogin();

  db.auth.onAuthStateChange((_event, session) => {
    if (session) showApp(session.user);
    else         showLogin();
  });
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-email').textContent = user.email;
  loadVolunteers();
  loadReferrals();
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const msg   = document.getElementById('login-msg');
  const btn   = document.getElementById('login-btn');
  if (!email) { msg.textContent = 'Please enter your email address.'; msg.className = 'login-msg err'; return; }
  btn.disabled   = true;
  btn.textContent = 'Sending…';
  msg.textContent = '';
  const { error } = await db.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  btn.disabled   = false;
  btn.textContent = 'Send magic link';
  if (error) { msg.textContent = error.message; msg.className = 'login-msg err'; }
  else        { msg.textContent = 'Check your email for a magic link.'; msg.className = 'login-msg ok'; }
});

document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('sign-out-btn').addEventListener('click', async () => {
  await db.auth.signOut();
});

// ── Data ────────────────────────────────────────────────────
async function loadReferrals() {
  const { data, error } = await db
    .from('referrals')
    .select(`
      *,
      clients (*),
      referrers (*),
      wishlist_items (*),
      referral_crisis_types ( crisis_types (name) ),
      gathered_vol:volunteers!gathered_by_id (name),
      delivered_vol:volunteers!delivered_by_id (name)
    `)
    .order('referral_number', { ascending: false });

  if (error) { console.error(error); return; }
  allReferrals = data || [];
  if (selectedRef) {
    const updated = allReferrals.find(x => x.id === selectedRef.id);
    if (updated) { selectedRef = updated; renderDetail(selectedRef); }
  }
  renderList();
}

async function loadVolunteers() {
  const { data } = await db.from('volunteers').select('id, name').eq('active', true).order('name');
  volunteers = data || [];
}

function deriveStatus(r) {
  if (r.cancelled_at)          return 'cancelled';
  if (r.completed_at)          return 'completed';
  if (r.gathered_at)           return 'gathered';
  if (r.wishlist_submitted_at) return 'awaiting gathering';
  if (r.received_at)           return 'awaiting wishlist';
  return 'new';
}

function crisisNames(r) {
  if (!r.referral_crisis_types) return [];
  return r.referral_crisis_types.map(rct => rct.crisis_types?.name).filter(Boolean);
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
}

function fmtDateTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
    + ', ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function toInputDatetime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

function toInputDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

// ── List ────────────────────────────────────────────────────
function filterReferrals() {
  const filtered = allReferrals.filter(r => {
    const status = deriveStatus(r);
    const q = searchQuery.toLowerCase();

    const matchesFilter = activeFilter === 'all'      ? true
      : activeFilter === 'active'    ? !['completed','cancelled'].includes(status)
      : activeFilter === 'delivery'   ? r.fulfilment_type === 'delivery'
      : activeFilter === 'collection' ? r.fulfilment_type === 'collection'
      : activeFilter === 'awaiting-wishlist' ? status === 'awaiting wishlist'
      : activeFilter === 'completed' ? status === 'completed'
      : activeFilter === 'cancelled' ? status === 'cancelled'
      : true;

    const matchesSearch = !q || [
      String(r.referral_number),
      r.clients?.first_name, r.clients?.last_name,
      r.referrers?.name, r.referrers?.organisation,
      r.clients?.postcode,
    ].filter(Boolean).some(v => v.toLowerCase().includes(q));

    return matchesFilter && matchesSearch;
  });
  return filtered.sort((a, b) => {
    const diff = a.referral_number - b.referral_number;
    return sortAscending ? diff : -diff;
  });
}

function renderList() {
  const list    = document.getElementById('ref-list');
  const visible = filterReferrals();
  if (!visible.length) {
    list.innerHTML = '<div class="ref-list-empty">No referrals found</div>';
    return;
  }
  list.innerHTML = visible.map(r => {
    const status  = deriveStatus(r);
    const name    = [r.clients?.first_name, r.clients?.last_name].filter(Boolean).join(' ') || '—';
    const org     = r.referrers?.organisation || r.referrers?.name || '';
    const isSelected = selectedRef?.referral_number === r.referral_number;
    return `
      <div class="ref-item${isSelected ? ' selected' : ''}" data-ref="${r.referral_number}">
        <div class="ref-item-top">
          <span class="ref-num">#${r.referral_number}</span>
          <span class="ref-date">${fmtDate(r.received_at || r.created_at)}</span>
        </div>
        <div class="ref-name">${esc(name)}</div>
        ${org ? `<div class="ref-org">${esc(org)}</div>` : ''}
        <div class="tags">
          <span class="tag tag-${r.fulfilment_type}">${r.fulfilment_type.charAt(0).toUpperCase() + r.fulfilment_type.slice(1)}</span>
          <span class="tag tag-${statusKey(status)}">${statusLabel(status)}</span>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.ref-item').forEach(el => {
    el.addEventListener('click', () => {
      const r = allReferrals.find(x => x.referral_number === Number(el.dataset.ref));
      selectReferral(r);
    });
  });
}

function statusKey(s) {
  return { 'completed': 'completed', 'cancelled': 'cancelled', 'gathered': 'gathered',
           'awaiting gathering': 'gathered', 'awaiting wishlist': 'wishlist', 'new': 'new' }[s] || 'new';
}
function statusLabel(s) {
  return { 'completed': 'Completed', 'cancelled': 'Cancelled', 'gathered': 'Gathered',
           'awaiting gathering': 'Awaiting gathering', 'awaiting wishlist': 'Awaiting wishlist', 'new': 'New' }[s] || s;
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtPhone(s) {
  if (!s) return '';
  // Convert +447... → 07...
  const n = String(s).replace(/^\+44/, '0');
  return esc(n);
}

// ── Filters ─────────────────────────────────────────────────
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderList();
  });
});

document.getElementById('sort-btn').addEventListener('click', () => {
  sortAscending = !sortAscending;
  document.getElementById('sort-btn').textContent = sortAscending ? '↑' : '↓';
  renderList();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderList();
});

// ── Detail ──────────────────────────────────────────────────
function selectReferral(r) {
  selectedRef     = r;
  editingSection  = null;
  showCancelForm  = false;
  showConvertForm = false;
  renderList();
  renderDetail(r);
}

function renderDetail(r) {
  const panel  = document.getElementById('detail');
  const status = deriveStatus(r);
  const client = r.clients || {};
  const ref    = r.referrers || {};
  const name   = [client.first_name, client.last_name].filter(Boolean).join(' ') || '—';
  const crises = crisisNames(r);
  const items  = (r.wishlist_items || []).sort((a,b) => a.category.localeCompare(b.category) || a.description.localeCompare(b.description));

  const mapsUrl = (client.latitude && client.longitude)
    ? `https://www.google.com/maps?q=${client.latitude},${client.longitude}`
    : null;

  // Milestones view
  const msFields = [
    { label: 'Referral received',  field: 'received_at',          ts: r.received_at },
    { label: 'Wishlist submitted', field: 'wishlist_submitted_at', ts: r.wishlist_submitted_at },
    { label: 'Client contacted',   field: 'client_contacted_at',  ts: r.client_contacted_at },
    { label: 'Items gathered',     field: 'gathered_at',           ts: r.gathered_at },
    { label: r.fulfilment_type === 'delivery' ? 'Delivered' : 'Completed', field: 'completed_at', ts: r.completed_at },
  ];
  const firstPending = msFields.findIndex(m => !m.ts && status !== 'cancelled');

  const milestonesView = msFields.map((m,i) => {
    const done = !!m.ts;
    const next = !done && i === firstPending;
    return `<div class="ms-row">
      <div class="ms-dot ${done ? 'ms-dot-done' : next ? 'ms-dot-next' : 'ms-dot-pending'}"></div>
      <span class="ms-label">${m.label}</span>
      <span class="ms-date">${done ? fmtDateTime(m.ts) : '—'}</span>
    </div>`;
  }).join('')
  + (r.gathered_by_id ? `<div class="ms-row"><div class="ms-dot ms-dot-done"></div><span class="ms-label">Gathered by</span><span class="ms-date">${esc(r.gathered_vol?.name || '—')}</span></div>` : '')
  + (r.delivered_by_id ? `<div class="ms-row"><div class="ms-dot ms-dot-done"></div><span class="ms-label">Delivered by</span><span class="ms-date">${esc(r.delivered_vol?.name || '—')}</span></div>` : '');

  const volOpts = (currentId) => `<option value="">— unassigned —</option>`
    + volunteers.map(v => `<option value="${v.id}"${String(v.id) === String(currentId) ? ' selected' : ''}>${esc(v.name)}</option>`).join('');

  const milestonesEdit = msFields.map(m => `
    <div class="ms-edit-row">
      <span class="ms-edit-label">${m.label}</span>
      <input type="datetime-local" id="ms-${m.field}" class="ms-dt-input" value="${esc(toInputDatetime(m.ts))}">
      <button class="btn-now" onclick="fillMsNow('${m.field}')">Now</button>
    </div>`).join('')
  + `<div class="vol-edit-row">
      <span class="ms-edit-label">Gathered by</span>
      <select id="vol-gathered" class="vol-select">${volOpts(r.gathered_by_id)}</select>
      <button class="btn-now" onclick="saveVolunteer(${r.id},'gathered_by_id','vol-gathered')">Save</button>
    </div>`
  + (r.fulfilment_type === 'delivery' ? `
    <div class="vol-edit-row">
      <span class="ms-edit-label">Delivered by</span>
      <select id="vol-delivered" class="vol-select">${volOpts(r.delivered_by_id)}</select>
      <button class="btn-now" onclick="saveVolunteer(${r.id},'delivered_by_id','vol-delivered')">Save</button>
    </div>` : '')
  + `<div class="edit-actions">
      <button class="btn-save-edit" onclick="saveMilestones(${r.id})">Save dates</button>
      <button class="btn-cancel-edit" onclick="toggleEdit('milestones')">Cancel</button>
    </div>`;

  // Payment view/edit
  const paymentView = r.payment_recipient ? `
    <div class="pay-row"><span class="pay-label">Recipient</span><span class="pay-value">${esc(r.payment_recipient)}</span></div>
    <div class="pay-row"><span class="pay-label">Method</span><span class="pay-value">${esc(r.payment_method || '—')}</span></div>
    <div class="pay-row"><span class="pay-label">Sent</span><span class="pay-value">${fmtDate(r.payment_sent_at)}</span></div>
    <div class="pay-row"><span class="pay-label">Received</span><span class="pay-value ${r.payment_received_at ? '' : 'stat-wishlist'}">${fmtDate(r.payment_received_at)}</span></div>
    ${r.scheduled_date ? `<div class="pay-row" style="margin-top:8px"><span class="pay-label">Scheduled</span><span class="pay-value">${fmtDate(r.scheduled_date)}</span></div>` : ''}
  ` : `<div style="font-size:13px;color:var(--text3)">No payment required</div>
    ${r.scheduled_date ? `<div class="pay-row" style="margin-top:8px"><span class="pay-label">Scheduled</span><span class="pay-value">${fmtDate(r.scheduled_date)}</span></div>` : ''}`;

  const paymentEdit = r.payment_recipient ? `
    <div class="pay-row"><span class="pay-label">Recipient</span><span class="pay-value">${esc(r.payment_recipient)}</span></div>
    <div class="pay-row"><span class="pay-label">Method</span><span class="pay-value">${esc(r.payment_method || '—')}</span></div>
    <div class="pay-row">
      <span class="pay-label">Sent</span>
      <input type="date" id="pay-sent-input" class="pay-date-input" value="${esc(toInputDate(r.payment_sent_at))}">
    </div>
    <div class="pay-row">
      <span class="pay-label">Received</span>
      <input type="date" id="pay-recv-input" class="pay-date-input" value="${esc(toInputDate(r.payment_received_at))}">
    </div>
    ${r.scheduled_date ? `<div class="pay-row"><span class="pay-label">Scheduled</span><span class="pay-value">${fmtDate(r.scheduled_date)}</span></div>` : ''}
    <div class="edit-actions">
      <button class="btn-save-edit" onclick="savePayment(${r.id})">Save</button>
      <button class="btn-cancel-edit" onclick="toggleEdit('payment')">Cancel</button>
    </div>
  ` : paymentView;

  // Actions card
  const actionsCard = `
    <div class="action-card">
      <div class="action-card-title">Actions</div>
      ${showCancelForm ? `
        <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;">Cancellation reason (optional)</div>
        <textarea id="cancel-reason" class="cancel-reason-area" placeholder="e.g. Client no longer needs help…"></textarea>
        <div class="edit-actions">
          <button class="btn-confirm-cancel" onclick="cancelReferral(${r.id})">Confirm cancel</button>
          <button class="btn-cancel-edit" onclick="toggleCancelForm()">Back</button>
        </div>
      ` : showConvertForm ? `
        <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;">Convert to delivery</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;">Delivery address</div>
        <textarea id="convert-address" class="cancel-reason-area" style="height:72px;" placeholder="Full delivery address…"></textarea>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;">Payment recipient</div>
            <select id="convert-pay-recipient" class="vol-select">
              <option value="">— none —</option>
              <option value="referrer">Referrer</option>
              <option value="client">Client</option>
            </select>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;">Payment method</div>
            <select id="convert-pay-method" class="vol-select">
              <option value="">— none —</option>
              <option value="link">Link</option>
              <option value="invoice">Invoice</option>
            </select>
          </div>
        </div>
        <div class="edit-actions">
          <button class="btn-save-edit" onclick="convertToDelivery(${r.id}, ${client.id})">Confirm conversion</button>
          <button class="btn-cancel-edit" onclick="toggleConvertForm()">Back</button>
        </div>
      ` : `
        <div class="action-buttons">
          ${!r.cancelled_at ? `<button class="btn-do-cancel" onclick="toggleCancelForm()">Cancel referral</button>` : ''}
          ${r.fulfilment_type === 'collection' && !r.cancelled_at ? `<button class="btn-do-convert" onclick="toggleConvertForm()">Convert to delivery</button>` : ''}
          ${(r.completed_at || r.cancelled_at) ? `<button class="btn-do-uncomplete" onclick="uncompleteReferral(${r.id})">${r.cancelled_at ? 'Uncancel' : 'Unmark as completed'}</button>` : ''}
          ${(!r.cancelled_at && !r.completed_at) ? `<span style="font-size:12px;color:var(--text3)">Mark gathered/completed via Telegram bot, or use milestone edit above.</span>` : ''}
        </div>
      `}
    </div>`;

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-header-left">
        <h2>${esc(name)} — #${r.referral_number}</h2>
        <p>${esc(ref.organisation || ref.name || '')}${ref.name && ref.organisation ? ' · ' + esc(ref.name) : ''} · referred ${fmtDate(r.received_at || r.created_at)}</p>
      </div>
      <div class="detail-actions">
        ${!r.wishlist_submitted_at && !r.cancelled_at ? `<button class="btn" id="wishlist-link-btn" onclick="copyWishlistUrl(${r.referral_number})">📋 Copy wishlist link</button>` : ''}
        ${mapsUrl ? `<a href="${mapsUrl}" target="_blank" class="btn btn-maps">📍 Maps</a>` : ''}
        <button class="btn" onclick="refreshSelected()">↻ Refresh</button>
      </div>
    </div>
    <div class="detail-body">

      ${r.cancelled_at ? `<div class="cancelled-banner">⚠️ Cancelled${r.cancellation_reason ? ' · ' + esc(r.cancellation_reason) : ''}</div>` : ''}

      <div class="stat-row">
        <div class="stat"><label>Type</label><span>${r.fulfilment_type.charAt(0).toUpperCase() + r.fulfilment_type.slice(1)}</span></div>
        <div class="stat"><label>Status</label><span class="stat-${statusKey(status)}">${statusLabel(status)}</span></div>
        <div class="stat"><label>Adults</label><span>${r.adults_count ?? '—'}${r.adults_by_sex ? ' <span style="font-size:11px;font-weight:400;color:var(--text3)">(' + (r.adults_by_sex.male ? r.adults_by_sex.male + 'M' : '') + (r.adults_by_sex.male && r.adults_by_sex.female ? '/' : '') + (r.adults_by_sex.female ? r.adults_by_sex.female + 'F' : '') + ')</span>' : ''}</span></div>
        <div class="stat"><label>Children</label><span>${r.children_count ?? '—'}</span></div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-title">Client</div>
          <div class="field">
            <label>Name</label>
            <span>${esc(name)}${client.vulnerable ? ' <span class="tag tag-vuln" style="margin-left:6px">Vulnerable</span>' : ''}</span>
          </div>
          ${client.phone ? `<div class="field"><label>Phone</label><span>${fmtPhone(client.phone)}</span></div>` : ''}
          ${client.client_secondary_contact ? `<div class="field"><label>Secondary contact</label><span>${esc(client.client_secondary_contact)}</span></div>` : ''}
          ${client.postcode ? `<div class="field"><label>Postcode</label><span>${esc(client.postcode)}</span></div>` : ''}
          ${r.can_help_lift !== null ? `<div class="field"><label>Can help lift</label><span style="color:${r.can_help_lift ? 'var(--green)' : 'var(--red)'}">${r.can_help_lift ? 'Yes' : 'No'}</span></div>` : ''}
          ${crises.length ? `<div class="field"><label>Crisis</label><span>${crises.map(esc).join(', ')}</span></div>` : ''}
          ${r.crisis_other_detail ? `<div class="field"><label>Crisis detail</label><span>${esc(r.crisis_other_detail)}</span></div>` : ''}
          ${formatChildAges(r.child_ages)}
        </div>

        ${r.fulfilment_type === 'delivery' ? `
        <div class="card">
          <div class="card-title">Delivery address</div>
          <div class="address-box">
            ${client.geocoded_address ? esc(client.geocoded_address).replace(/, /g,'<br>') : (client.address ? esc(client.address) : '<span style="color:var(--text3)">No address recorded</span>')}
            ${client.geocode_partial ? '<div class="address-note">⚠️ Partial match — verify before delivery</div>' : ''}
          </div>
          <div class="field"><label>Referrer</label><span>${esc(ref.name || '—')}${ref.phone ? ' · ' + fmtPhone(ref.phone) : ''}</span></div>
          <div class="field"><label>Organisation</label><span>${esc(ref.organisation || '—')}</span></div>
          ${ref.email ? `<div class="field"><label>Email</label><a href="mailto:${esc(ref.email)}">${esc(ref.email)}</a></div>` : ''}
        </div>` : `
        <div class="card">
          <div class="card-title">Referrer</div>
          <div class="field"><label>Name</label><span>${esc(ref.name || '—')}</span></div>
          ${ref.organisation ? `<div class="field"><label>Organisation</label><span>${esc(ref.organisation)}</span></div>` : ''}
          ${ref.phone ? `<div class="field"><label>Phone</label><span>${fmtPhone(ref.phone)}</span></div>` : ''}
          ${ref.email ? `<div class="field"><label>Email</label><a href="mailto:${esc(ref.email)}">${esc(ref.email)}</a></div>` : ''}
        </div>`}
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-title-row">
            <div class="card-title">Milestones</div>
            <button class="btn-edit-card${editingSection==='milestones'?' active':''}" onclick="toggleEdit('milestones')">${editingSection==='milestones'?'Cancel':'Edit'}</button>
          </div>
          ${editingSection === 'milestones' ? milestonesEdit : milestonesView}
        </div>

        <div class="card">
          <div class="card-title-row">
            <div class="card-title">Payment</div>
            ${r.payment_recipient ? `<button class="btn-edit-card${editingSection==='payment'?' active':''}" onclick="toggleEdit('payment')">${editingSection==='payment'?'Cancel':'Edit'}</button>` : ''}
          </div>
          ${editingSection === 'payment' ? paymentEdit : paymentView}
        </div>
      </div>

      ${items.length ? `
      <div class="card">
        <div class="card-title">Wishlist items (${items.length})</div>
        ${items.map(it => `
          <div class="item-row">
            <span class="item-qty">×${it.quantity}</span>
            <span class="item-name">${esc(it.description)}</span>
            <span class="item-cat ic-${it.category}">${it.category}</span>
          </div>`).join('')}
      </div>` : `
      <div class="card">
        <div class="card-title">Wishlist items</div>
        <div style="font-size:13px;color:var(--text3)">No wishlist received yet</div>
      </div>`}

      <div class="card">
        <div class="card-title">Notes</div>
        <textarea id="notes-area" class="notes-area" placeholder="Add a note…">${esc(r.notes || '')}</textarea>
        <button class="notes-save" onclick="saveNotes(${r.id})">Save note</button>
      </div>

      ${actionsCard}

    </div>`;
}

function formatChildAges(ages) {
  if (!ages || !Object.keys(ages).length) return '';
  const labels = { under_1:'<1', boy_1_3:'Boy 1–3', girl_1_3:'Girl 1–3',
    boy_4_7:'Boy 4–7', girl_4_7:'Girl 4–7', boy_8_11:'Boy 8–11',
    girl_8_11:'Girl 8–11', boy_12_plus:'Boy 12+', girl_12_plus:'Girl 12+' };
  const parts = Object.entries(ages)
    .filter(([,v]) => v > 0)
    .map(([k,v]) => `${labels[k]||k}${v>1?' ×'+v:''}`);
  if (!parts.length) return '';
  return `<div class="field"><label>Children</label><span>${parts.join(', ')}</span></div>`;
}

// ── Edit helpers ────────────────────────────────────────────
function toggleEdit(section) {
  editingSection = editingSection === section ? null : section;
  showCancelForm = false;
  renderDetail(selectedRef);
}

function toggleCancelForm() {
  showCancelForm  = !showCancelForm;
  showConvertForm = false;
  renderDetail(selectedRef);
}

function toggleConvertForm() {
  showConvertForm = !showConvertForm;
  showCancelForm  = false;
  renderDetail(selectedRef);
}

function fillMsNow(field) {
  const el = document.getElementById('ms-' + field);
  if (el) el.value = toInputDatetime(new Date().toISOString());
}

async function patchReferral(id, fields) {
  const { error } = await db.from('referrals').update(fields).eq('id', id);
  if (error) { console.error('Patch error:', error); alert('Save failed: ' + error.message); return false; }
  const idx = allReferrals.findIndex(x => x.id === id);
  if (idx >= 0) {
    Object.assign(allReferrals[idx], fields);
    selectedRef = allReferrals[idx];
  }
  renderList();
  renderDetail(selectedRef);
  return true;
}

async function saveMilestones(id) {
  const r = allReferrals.find(x => x.id === id);
  const fields = ['received_at','wishlist_submitted_at','client_contacted_at','gathered_at','completed_at'];
  const update = {};
  for (const f of fields) {
    const el = document.getElementById('ms-' + f);
    if (!el) continue;
    update[f] = el.value ? new Date(el.value).toISOString() : null;
  }
  if (update.completed_at && r?.cancelled_at) {
    alert('Cannot mark as completed while the referral is cancelled — uncancel it first.');
    return;
  }
  editingSection = null;
  await patchReferral(id, update);
}

async function saveVolunteer(id, field, selectId) {
  const val = document.getElementById(selectId)?.value;
  const parsed = val ? (isNaN(val) ? val : Number(val)) : null;
  // Update joined name before patching so renderDetail sees it immediately
  const volName = volunteers.find(v => String(v.id) === String(val))?.name || null;
  const joinField = field === 'gathered_by_id' ? 'gathered_vol' : 'delivered_vol';
  const r = allReferrals.find(x => x.id === id);
  if (r) r[joinField] = volName ? { name: volName } : null;
  await patchReferral(id, { [field]: parsed });
}

async function savePayment(id) {
  const sent = document.getElementById('pay-sent-input')?.value;
  const recv = document.getElementById('pay-recv-input')?.value;
  editingSection = null;
  await patchReferral(id, {
    payment_sent_at:     sent ? new Date(sent).toISOString() : null,
    payment_received_at: recv ? new Date(recv).toISOString() : null,
  });
}

async function cancelReferral(id) {
  const reason = document.getElementById('cancel-reason')?.value?.trim() || null;
  showCancelForm = false;
  await patchReferral(id, {
    cancelled_at:        new Date().toISOString(),
    cancellation_reason: reason,
    completed_at:        null,
  });
}

async function patchClient(clientId, fields) {
  const { error } = await db.from('clients').update(fields).eq('id', clientId);
  if (error) { console.error('Client patch error:', error); return; }
  allReferrals.forEach(r => {
    if (r.clients?.id === clientId) Object.assign(r.clients, fields);
  });
}

async function convertToDelivery(referralId, clientId) {
  const address   = document.getElementById('convert-address')?.value?.trim() || null;
  const recipient = document.getElementById('convert-pay-recipient')?.value || null;
  const method    = document.getElementById('convert-pay-method')?.value || null;
  if (address) await patchClient(clientId, { address });
  const fields = { fulfilment_type: 'delivery' };
  if (recipient) fields.payment_recipient = recipient;
  if (method)    fields.payment_method    = method;
  showConvertForm = false;
  await patchReferral(referralId, fields);
}

async function uncompleteReferral(id) {
  await patchReferral(id, {
    completed_at:        null,
    cancelled_at:        null,
    cancellation_reason: null,
  });
}

// ── Notes ───────────────────────────────────────────────────
async function saveNotes(referralId) {
  const text = document.getElementById('notes-area')?.value || '';
  const { error } = await db.from('referrals').update({ notes: text }).eq('id', referralId);
  if (!error) {
    const r = allReferrals.find(x => x.id === referralId);
    if (r) r.notes = text;
  }
}

// ── Wishlist link ────────────────────────────────────────────
function copyWishlistUrl(referralNumber) {
  const url = WISHLIST_FORM_URL + referralNumber;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('wishlist-link-btn');
    if (btn) {
      btn.textContent = '✓ Copied!';
      setTimeout(() => { btn.textContent = '📋 Copy wishlist link'; }, 2000);
    }
  });
}

// ── Refresh ─────────────────────────────────────────────────
async function refreshSelected() {
  await loadReferrals();
}

// ── Boot ────────────────────────────────────────────────────
initAuth();
</script>
</body>
</html>
