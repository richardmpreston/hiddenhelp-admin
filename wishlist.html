<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Help Wishlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
/* ── Variables ─────────────────────────────────────────────── */
:root {
  --bg:        #F7F4F0;
  --panel:     #FFFFFF;
  --border:    #DDD8CF;
  --text:      #1C1916;
  --text2:     #5C564E;
  --text3:     #9C9389;
  --accent:    #C0532A;
  --green:     #3A7D44;
  --green-bg:  #E8F4EA;
  --blue:      #1A5FA8;
  --blue-bg:   #E5EFFE;
  --amber:     #8A6000;
  --amber-bg:  #FEF3D8;
  --red:       #9B2020;
  --red-bg:    #FDEAEA;
  --radius:    8px;
  --font:      'Sora', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: var(--font);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Screen layout ─────────────────────────────────────────── */
.page-wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 24px 48px;
}

/* ── Top bar ───────────────────────────────────────────────── */
.top-bar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
}
.top-bar-left {}
.wordmark {
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -.3px;
  margin-bottom: 2px;
}
.doc-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.3px;
}
.doc-meta {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
}
.top-bar-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  font-family: var(--font);
  text-decoration: none;
  transition: background .1s;
}
.btn:hover { background: var(--bg); }
.btn-print {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-print:hover { background: #a84625; }

/* ── Cards ─────────────────────────────────────────────────── */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text3);
  margin-bottom: 14px;
}

/* ── Two column ────────────────────────────────────────────── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 600px) {
  .two-col { grid-template-columns: 1fr; }
}

/* ── Fields ────────────────────────────────────────────────── */
.field {
  display: flex;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.4;
}
.field:last-child { border-bottom: none; }
.field label {
  flex: 0 0 110px;
  color: var(--text3);
  font-size: 12px;
  padding-top: 1px;
}
.field span, .field a {
  color: var(--text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Household stat row ────────────────────────────────────── */
.stat-row {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.stat {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  flex: 1;
  min-width: 80px;
}
.stat label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text3);
  margin-bottom: 4px;
}
.stat span {
  font-size: 16px;
  font-weight: 600;
}

/* ── Tags ──────────────────────────────────────────────────── */
.tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  border-radius: 4px;
  padding: 1px 7px;
}
.tag-vuln { background: var(--red-bg); color: var(--red); }
.tag-lift  { background: var(--green-bg); color: var(--green); }
.tag-nolift { background: var(--red-bg); color: var(--red); }
.tag-delivery { background: var(--blue-bg); color: var(--blue); }
.tag-collection { background: var(--amber-bg); color: var(--amber); }

/* ── Address ───────────────────────────────────────────────── */
.address-box {
  font-size: 13px;
  line-height: 1.7;
  margin-bottom: 12px;
  color: var(--text);
}
.address-note {
  font-size: 11px;
  color: var(--amber);
  margin-top: 4px;
}

/* ── Items table ───────────────────────────────────────────── */
.items-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.items-table th {
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text3);
  padding: 0 8px 10px 8px;
  border-bottom: 2px solid var(--border);
}
.items-table th.col-check { width: 32px; }
.items-table th.col-qty   { width: 40px; text-align: center; }
.items-table th.col-cat   { width: 90px; text-align: right; }

.items-table .cat-header td {
  padding: 10px 8px 4px 8px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
}

.items-table .item-row td {
  padding: 8px 8px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.items-table .item-row:last-child td { border-bottom: none; }

.items-table .col-check { text-align: center; }
.items-table .col-qty   { text-align: center; font-weight: 600; color: var(--text2); }

/* checkbox cell */
.check-box {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  background: #fff;
  vertical-align: middle;
}

/* category pill */
.cat-pill {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  border-radius: 4px;
  padding: 1px 7px;
  float: right;
}
.cat-general    { background: var(--blue-bg);  color: var(--blue); }
.cat-electrical { background: var(--amber-bg); color: var(--amber); }
.cat-furniture  { background: var(--green-bg); color: var(--green); }

/* ── Notes ─────────────────────────────────────────────────── */
.notes-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  white-space: pre-wrap;
}

/* ── Action bar ────────────────────────────────────────────── */
.action-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0 20px;
  flex-wrap: wrap;
}
.btn-tg {
  background: #229ED9;
  color: #fff;
  border-color: #229ED9;
}
.btn-tg:hover:not(:disabled) { background: #1a87b8; }
.btn-email {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}
.btn-email:hover:not(:disabled) { background: #2e6438; }
.btn:disabled { opacity: .55; cursor: not-allowed; }
.action-status {
  font-size: 13px;
  padding: 2px 0;
  flex: 1;
  min-width: 200px;
}
.action-status.ok  { color: var(--green); }
.action-status.err { color: var(--red); }

/* ── States ────────────────────────────────────────────────── */
#loading, #error {
  text-align: center;
  padding: 80px 24px;
  color: var(--text3);
  font-size: 15px;
}
#error { color: var(--red); }

/* ── Print styles ──────────────────────────────────────────── */
@media print {
  #content { display: block !important; }
  html, body { background: #fff; font-size: 12px; }
  .page-wrap { padding: 0; max-width: 100%; }
  .no-print  { display: none !important; }
  .card { border: 1px solid #ccc; border-radius: 0; box-shadow: none; margin-bottom: 12px; padding: 12px 14px; }
  .stat { border: 1px solid #ccc; border-radius: 0; }
  .check-box { border-color: #999; }
  .items-table .item-row td { border-bottom: 1px solid #ddd; }
  .items-table th { border-bottom: 2px solid #999; }
  .col-cat, .items-table th.col-cat { display: none; }
  .tag { border: 1px solid #999; background: #fff !important; color: #000 !important; }
  .items-table .cat-header td {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    color: #000;
    border-bottom: 1.5px solid #000;
    padding-top: 14px;
  }
  .two-col { page-break-inside: avoid; }
  .items-table tr { page-break-inside: avoid; }
  .top-bar { margin-bottom: 16px; }
  .address-box { color: #000; }
}
</style>
</head>
<body>

<div id="loading">Loading…</div>
<div id="error" style="display:none"></div>

<div id="content" class="page-wrap" style="display:none">

  <div class="top-bar">
    <div class="top-bar-left">
      <div class="wordmark">Hidden Help</div>
      <div class="doc-title" id="doc-title">Wishlist</div>
      <div class="doc-meta" id="doc-meta"></div>
    </div>
    <div class="top-bar-actions no-print">
      <a href="index.html" class="btn">&#8592; Admin</a>
      <button class="btn btn-print" onclick="printWishlist()">Print / Save PDF</button>
    </div>
  </div>

  <div class="action-bar no-print">
    <button class="btn btn-tg"    id="btn-tg"    onclick="handlePostTelegram()">📤 Post to Telegram</button>
    <button class="btn btn-email" id="btn-email" onclick="handleEmailDraft()">✉️ Email Draft</button>
    <span class="action-status" id="action-status"></span>
  </div>

  <div class="stat-row" id="stat-row"></div>

  <div class="two-col" id="info-cols"></div>

  <div class="card">
    <div class="card-title" id="items-title">Wishlist items</div>
    <table class="items-table" id="items-table">
      <thead>
        <tr>
          <th class="col-check no-print"></th>
          <th class="col-qty">Qty</th>
          <th>Item</th>
          <th class="col-cat">Category</th>
        </tr>
      </thead>
      <tbody id="items-body"></tbody>
    </table>
    <div id="no-items" style="display:none;font-size:13px;color:var(--text3)">No wishlist items recorded.</div>
  </div>

  <div class="card" id="notes-card" style="display:none">
    <div class="card-title">Notes</div>
    <div class="notes-text" id="notes-text"></div>
  </div>

</div>

<script>
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let referralData = null;

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

async function printWishlist() {
  const btn = document.querySelector('.btn-print');
  const orig = btn.textContent;
  btn.textContent = 'Generating…';
  btn.disabled = true;
  try {
    const bytes = await generatePDFBytes(referralData);
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 30000);
  } catch (e) {
    alert('PDF generation failed: ' + e.message);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

function fmtPhone(p) {
  if (!p) return '';
  const digits = String(p).replace(/\D/g,'');
  if (digits.startsWith('44') && digits.length === 12) return '0' + digits.slice(2);
  if (digits.length === 10 && digits.startsWith('7')) return '0' + digits;
  return String(p);
}

function formatChildAges(ages) {
  if (!ages || !Object.keys(ages).length) return '';
  const labels = { under_1:'<1', boy_1_3:'Boy 1–3', girl_1_3:'Girl 1–3',
    boy_4_7:'Boy 4–7', girl_4_7:'Girl 4–7', boy_8_11:'Boy 8–11',
    girl_8_11:'Girl 8–11', boy_12_plus:'Boy 12+', girl_12_plus:'Girl 12+' };
  return Object.entries(ages).filter(([,v]) => v > 0)
    .map(([k,v]) => `${labels[k]||k}${v>1?' ×'+v:''}`).join(', ');
}

async function load() {
  const params = new URLSearchParams(location.search);
  const refNum = params.get('ref');

  if (!refNum) {
    showError('No referral number specified. Use ?ref=1234 in the URL.');
    return;
  }

  const { data: { session } } = await db.auth.getSession();
  if (!session) {
    showError('Not logged in. Please open this page from the Hidden Help admin UI.');
    document.getElementById('error').insertAdjacentHTML('afterend',
      '<div style="text-align:center;margin-top:12px"><a href="index.html" style="color:var(--accent);font-size:14px">Go to admin UI →</a></div>');
    return;
  }

  const { data, error } = await db
    .from('referrals')
    .select(`
      *,
      clients (*),
      referrers (*),
      wishlist_items (*),
      referral_crisis_types ( crisis_types (name) )
    `)
    .eq('referral_number', refNum)
    .maybeSingle();

  if (error) { showError('Failed to load referral: ' + error.message); return; }
  if (!data)  { showError('Referral #' + refNum + ' not found.'); return; }

  referralData = data;
  render(data);
}

function render(r) {
  const client = r.clients || {};
  const ref    = r.referrers || {};
  const name   = [client.first_name, client.last_name].filter(Boolean).join(' ') || '—';

  // Title
  document.title = `Hidden Help Wishlist #${r.referral_number}`;
  document.getElementById('doc-title').textContent = `Wishlist #${r.referral_number} — ${name}`;
  document.getElementById('doc-meta').textContent =
    `${r.fulfilment_type.charAt(0).toUpperCase() + r.fulfilment_type.slice(1)} · Referred ${fmtDate(r.received_at || r.created_at)} · Printed ${new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}`;

  // Stat row
  const adultSex = r.adults_by_sex
    ? ` (${[r.adults_by_sex.male ? r.adults_by_sex.male+'M' : '', r.adults_by_sex.female ? r.adults_by_sex.female+'F' : ''].filter(Boolean).join('/')})`
    : '';
  const childAges = formatChildAges(r.child_ages);
  const liftTag = r.can_help_lift !== null && r.can_help_lift !== undefined
    ? `<span class="tag ${r.can_help_lift ? 'tag-lift' : 'tag-nolift'}">${r.can_help_lift ? 'Can lift' : 'Cannot lift'}</span>`
    : '';
  const typeTag = `<span class="tag tag-${r.fulfilment_type}">${r.fulfilment_type.charAt(0).toUpperCase() + r.fulfilment_type.slice(1)}</span>`;

  document.getElementById('stat-row').innerHTML = `
    <div class="stat"><label>Adults</label><span>${r.adults_count ?? '—'}<small style="font-size:12px;font-weight:400;color:var(--text3)">${adultSex}</small></span></div>
    <div class="stat"><label>Children</label><span>${r.children_count ?? '—'}${childAges ? `<small style="font-size:11px;font-weight:400;color:var(--text3);display:block;margin-top:2px">${esc(childAges)}</small>` : ''}</span></div>
    <div class="stat"><label>Type</label><span style="font-size:14px">${typeTag}</span></div>
    ${liftTag ? `<div class="stat"><label>Lifting</label><span style="font-size:14px">${liftTag}</span></div>` : ''}
  `;

  // Crisis types
  const crises = (r.referral_crisis_types || []).map(rct => rct.crisis_types?.name).filter(Boolean);

  // Client + address/referrer cards
  const vulnerableTag = client.vulnerable
    ? ' <span class="tag tag-vuln">Vulnerable</span>' : '';

  const clientCard = `
    <div class="card">
      <div class="card-title">Client</div>
      <div class="field"><label>Name</label><span>${esc(name)}${vulnerableTag}</span></div>
      ${client.phone ? `<div class="field"><label>Phone</label><span>${fmtPhone(client.phone)}</span></div>` : ''}
      ${client.client_secondary_contact ? `<div class="field"><label>Secondary contact</label><span>${esc(client.client_secondary_contact)}</span></div>` : ''}
      ${client.postcode ? `<div class="field"><label>Postcode</label><span>${esc(client.postcode)}</span></div>` : ''}
      ${crises.length ? `<div class="field"><label>Crisis</label><span>${crises.map(esc).join(', ')}</span></div>` : ''}
      ${r.crisis_other_detail ? `<div class="field"><label>Detail</label><span>${esc(r.crisis_other_detail)}</span></div>` : ''}
    </div>`;

  const rightCard = r.fulfilment_type === 'delivery' ? `
    <div class="card">
      <div class="card-title">Delivery address</div>
      <div class="address-box">
        ${client.geocoded_address
          ? esc(client.geocoded_address).replace(/, /g, '<br>')
          : client.address
            ? esc(client.address)
            : '<span style="color:var(--text3)">No address recorded</span>'}
        ${client.geocode_partial ? '<div class="address-note">&#9888;&#65039; Partial match — verify before delivery</div>' : ''}
      </div>
      <div class="field"><label>Referrer</label><span>${esc(ref.name || '—')}${ref.phone ? ' · ' + fmtPhone(ref.phone) : ''}</span></div>
      ${ref.organisation ? `<div class="field"><label>Organisation</label><span>${esc(ref.organisation)}</span></div>` : ''}
      ${ref.email ? `<div class="field"><label>Email</label><a href="mailto:${esc(ref.email)}">${esc(ref.email)}</a></div>` : ''}
    </div>` : `
    <div class="card">
      <div class="card-title">Referrer</div>
      <div class="field"><label>Name</label><span>${esc(ref.name || '—')}</span></div>
      ${ref.organisation ? `<div class="field"><label>Organisation</label><span>${esc(ref.organisation)}</span></div>` : ''}
      ${ref.phone ? `<div class="field"><label>Phone</label><span>${fmtPhone(ref.phone)}</span></div>` : ''}
      ${ref.email ? `<div class="field"><label>Email</label><a href="mailto:${esc(ref.email)}">${esc(ref.email)}</a></div>` : ''}
    </div>`;

  document.getElementById('info-cols').innerHTML = clientCard + rightCard;

  // Items
  const items = (r.wishlist_items || []).sort((a, b) =>
    a.category.localeCompare(b.category) || a.description.localeCompare(b.description));

  const catOrder = ['general', 'electrical', 'furniture'];
  const catLabel = { general: 'General', electrical: 'Electrical', furniture: 'Furniture' };

  if (items.length) {
    document.getElementById('items-title').textContent = `Wishlist items (${items.length})`;
    document.getElementById('items-table').style.display = '';
    document.getElementById('no-items').style.display = 'none';

    const grouped = {};
    for (const it of items) {
      if (!grouped[it.category]) grouped[it.category] = [];
      grouped[it.category].push(it);
    }

    const tbody = document.getElementById('items-body');
    tbody.innerHTML = '';

    const cats = catOrder.filter(c => grouped[c]);
    const multiCat = cats.length > 1;

    for (const cat of cats) {
      if (multiCat) {
        const hdr = document.createElement('tr');
        hdr.className = 'cat-header';
        hdr.innerHTML = `<td colspan="4">${catLabel[cat]}</td>`;
        tbody.appendChild(hdr);
      }
      for (const it of grouped[cat]) {
        const row = document.createElement('tr');
        row.className = 'item-row';
        row.innerHTML = `
          <td class="col-check no-print"><span class="check-box"></span></td>
          <td class="col-qty">${it.quantity}</td>
          <td>${esc(it.description)}</td>
          <td class="col-cat"><span class="cat-pill cat-${cat}">${catLabel[cat]}</span></td>`;
        tbody.appendChild(row);
      }
    }
  } else {
    document.getElementById('items-table').style.display = 'none';
    document.getElementById('no-items').style.display = '';
  }

  // Notes
  if (r.notes && r.notes.trim()) {
    document.getElementById('notes-card').style.display = '';
    document.getElementById('notes-text').textContent = r.notes.trim();
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display  = '';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = '';
}

load();

// ── Action helpers ────────────────────────────────────────────

function setActionStatus(msg, type) {
  const el = document.getElementById('action-status');
  el.textContent = msg;
  el.className = 'action-status' + (type ? ' ' + type : '');
}

function setActionBusy(busy) {
  document.getElementById('btn-tg').disabled    = busy;
  document.getElementById('btn-email').disabled = busy;
}

// ── Shared data helpers (mirror Edge Function logic) ──────────

function buildHousehold(adultsCount, adultsBySex, childAges) {
  const parts = [];
  if (adultsBySex?.male)   parts.push(`${adultsBySex.male} x Adults Male`);
  if (adultsBySex?.female) parts.push(`${adultsBySex.female} x Adults Female`);
  if (!adultsBySex?.male && !adultsBySex?.female && adultsCount) parts.push(`${adultsCount} x Adults`);
  const labels = {
    under_1: 'Under 1', boy_1_3: 'Boy 1-3', girl_1_3: 'Girl 1-3',
    boy_4_7: 'Boy 4-7', girl_4_7: 'Girl 4-7', boy_8_11: 'Boy 8-11',
    girl_8_11: 'Girl 8-11', boy_12_plus: 'Boy 12+', girl_12_plus: 'Girl 12+',
  };
  if (childAges) {
    for (const [k, v] of Object.entries(childAges)) {
      if (v > 0) parts.push(`${v} x ${labels[k] || k}`);
    }
  }
  return parts.join(', ');
}

function hasCurtainsOrPoles(items) {
  return items.some(it => /curtain|pole/i.test(it.description));
}

function sortItems(items) {
  return [...items].sort((a, b) =>
    a.category.localeCompare(b.category) || a.description.localeCompare(b.description));
}

// ── PDF generation (browser, uses pdf-lib global from CDN) ────

async function ensurePdfLib() {
  if (window.PDFLib) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function generatePDFBytes(r) {
  await ensurePdfLib();
  const { PDFDocument, StandardFonts, rgb } = PDFLib;
  const c = r.clients || {};
  const ref = r.referrers || {};
  const isDelivery = r.fulfilment_type === 'delivery';
  const name = [c.first_name, c.last_name].filter(Boolean).join(' ');
  const items = sortItems(r.wishlist_items || []);
  const household = buildHousehold(r.adults_count, r.adults_by_sex, r.child_ages);
  const curtains = hasCurtainsOrPoles(items);
  const BLACK = rgb(0.11, 0.098, 0.086);

  const pdfDoc = await PDFDocument.create();
  const bold    = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
  const regular = await pdfDoc.embedFont(StandardFonts.Helvetica);

  const W = 595.28, H = 841.89, M = 50;
  const CW = W - M * 2;
  const FS = 10, HEAD_FS = 13, LH = 16;

  let page = pdfDoc.addPage([W, H]);
  let y = H - M;

  function maybeNewPage() {
    if (y < M + LH * 2) { page = pdfDoc.addPage([W, H]); y = H - M; }
  }

  function wrap(text, f, size) {
    const words = String(text).split(' ');
    const out = []; let cur = '';
    for (const w of words) {
      const test = cur ? `${cur} ${w}` : w;
      if (cur && f.widthOfTextAtSize(test, size) > CW) { out.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) out.push(cur);
    return out.length ? out : [''];
  }

  function write(text, f, size) {
    f = f || regular; size = size || FS;
    for (const line of wrap(text, f, size)) {
      maybeNewPage();
      page.drawText(line, { x: M, y, font: f, size, color: BLACK });
      y -= LH;
    }
  }

  function field(label, value) {
    if (!value) return;
    const labelText = `${label}: `;
    const lw = bold.widthOfTextAtSize(labelText, FS);
    const valueLines = wrap(value, regular, FS);
    maybeNewPage();
    page.drawText(labelText, { x: M, y, font: bold, size: FS, color: BLACK });
    if (lw + regular.widthOfTextAtSize(valueLines[0], FS) <= CW) {
      page.drawText(valueLines[0], { x: M + lw, y, font: regular, size: FS, color: BLACK });
      y -= LH;
      for (let i = 1; i < valueLines.length; i++) {
        maybeNewPage();
        page.drawText(valueLines[i], { x: M + lw, y, font: regular, size: FS, color: BLACK });
        y -= LH;
      }
    } else {
      y -= LH;
      for (const line of valueLines) {
        maybeNewPage();
        page.drawText(line, { x: M + 12, y, font: regular, size: FS, color: BLACK });
        y -= LH;
      }
    }
  }

  function gap(n) { y -= LH * (n || 0.6); }

  write('Hidden Help', bold, HEAD_FS);
  write(`Referral ${r.referral_number} — ${isDelivery ? 'Delivery' : 'Collection'}`, regular, HEAD_FS);
  gap();

  field('Client', name);
  field('Phone', fmtPhone(c.phone));
  if (c.client_secondary_contact) field('Second contact', c.client_secondary_contact);
  if (isDelivery) {
    field('Address', c.geocoded_address || c.address);
    field('Postcode', c.postcode);
    if (c.geocode_partial) write('⚠ Partial address match — verify before delivery');
  }
  gap();

  const refPhone = fmtPhone(ref.phone);
  const refDetail = [refPhone, ref.organisation].filter(Boolean).join(', ');
  field('Referrer', `${ref.name || ''}${refDetail ? ` (${refDetail})` : ''}`);
  gap();

  field('Household', household);
  if (r.notes) field('Notes', r.notes);
  gap();

  write(curtains ? 'Curtains or poles required' : 'No curtains or poles required');
  gap();

  write('Items', bold);
  const catOrder = ['general', 'electrical', 'furniture'];
  const catLabel = { general: 'General', electrical: 'Electrical', furniture: 'Furniture' };
  const grouped = {};
  for (const it of items) { if (!grouped[it.category]) grouped[it.category] = []; grouped[it.category].push(it); }
  const presentCats = catOrder.filter(c => grouped[c]);
  for (const cat of presentCats) {
    if (presentCats.length > 1) { gap(0.4); write(catLabel[cat], bold, FS - 1); }
    for (const it of grouped[cat]) write(`  ${it.quantity} x ${it.description}`);
  }

  return pdfDoc.save(); // returns Uint8Array
}

// ── Post to Telegram ──────────────────────────────────────────

async function handlePostTelegram() {
  if (!referralData) return;
  setActionBusy(true);
  setActionStatus('Posting to Telegram…');
  try {
    const { data: { session } } = await db.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/post-to-telegram`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ referral_number: referralData.referral_number }),
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
    setActionStatus('✓ Posted to Telegram', 'ok');
  } catch (e) {
    setActionStatus(`Failed: ${e.message}`, 'err');
  } finally {
    setActionBusy(false);
  }
}

// ── Email draft ───────────────────────────────────────────────

function buildEmailText(r) {
  const c = r.clients || {};
  const ref = r.referrers || {};
  const isDelivery = r.fulfilment_type === 'delivery';
  const name = [c.first_name, c.last_name].filter(Boolean).join(' ');
  const phone = fmtPhone(c.phone);
  const address = isDelivery
    ? (c.geocoded_address || c.address || '')
    : (r.notes ? `Needed asap. Please contact to arrange: ${r.notes}` : 'Needed asap. Please contact to arrange.');
  const refPhone = fmtPhone(ref.phone);
  const refDetail = [refPhone, ref.organisation].filter(Boolean).join(', ');
  const household = buildHousehold(r.adults_count, r.adults_by_sex, r.child_ages);

  const lines = [
    isDelivery ? 'Delivery' : 'Collection',
    `${r.referral_number} — ${name} (${phone})`,
    address,
  ];
  if (c.client_secondary_contact) lines.push(`Second contact: ${c.client_secondary_contact}`);
  lines.push(`Referrer: ${ref.name || ''}${refDetail ? ` (${refDetail})` : ''}`);
  if (isDelivery && r.notes) lines.push(`Notes: ${r.notes}`);
  lines.push(`Household: ${household}`);
  lines.push('', 'PDF attached.');

  return lines.join('\n');
}

async function handleEmailDraft() {
  if (!referralData) return;
  setActionBusy(true);
  setActionStatus('Generating PDF…');
  try {
    const pdfBytes  = await generatePDFBytes(referralData);
    const blob      = new Blob([pdfBytes], { type: 'application/pdf' });
    const blobUrl   = URL.createObjectURL(blob);
    const filename  = `Referral ${referralData.referral_number}.pdf`;

    // Trigger PDF download
    const a = document.createElement('a');
    a.href = blobUrl; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);

    // Open Gmail compose in new tab
    const subject = `*** REFERRAL ${referralData.referral_number} ***`;
    const body    = buildEmailText(referralData);
    const gmailUrl = 'https://mail.google.com/mail/?view=cm&fs=1'
      + `&to=${encodeURIComponent(REFERRAL_EMAIL_RECIPIENT)}`
      + `&su=${encodeURIComponent(subject)}`
      + `&body=${encodeURIComponent(body)}`;
    window.open(gmailUrl, '_blank');

    setActionStatus(`✓ PDF downloaded — attach ${filename} to the draft`, 'ok');
  } catch (e) {
    setActionStatus(`Failed: ${e.message}`, 'err');
  } finally {
    setActionBusy(false);
  }
}
